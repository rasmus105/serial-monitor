name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: serial-monitor
  BIN_NAME: serial-tui

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_suffix: macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build serial-tui
        run: cargo build --release --locked --package serial-tui --target ${{ matrix.target }}

      - name: Prepare release archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_SUFFIX: ${{ matrix.archive_suffix }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          DIST_DIR="dist"
          STAGE_DIR="$DIST_DIR/${APP_NAME}-${VERSION}-${ARCHIVE_SUFFIX}"
          BIN_PATH="target/${TARGET}/release/${BIN_NAME}"

          mkdir -p "$STAGE_DIR"
          cp "$BIN_PATH" "$STAGE_DIR/${APP_NAME}"
          cp README.md LICENSE "$STAGE_DIR/"

          tar -C "$DIST_DIR" -czf "$DIST_DIR/${APP_NAME}-${VERSION}-${ARCHIVE_SUFFIX}.tar.gz" "$(basename "$STAGE_DIR")"
          shasum -a 256 "$DIST_DIR/${APP_NAME}-${VERSION}-${ARCHIVE_SUFFIX}.tar.gz" > "$DIST_DIR/${APP_NAME}-${VERSION}-${ARCHIVE_SUFFIX}.tar.gz.sha256"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz.sha256
