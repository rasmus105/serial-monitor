name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: serial-monitor
  BIN_NAME: serial-tui

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build serial-tui
        run: cargo build --release --locked --package serial-tui --target ${{ matrix.target }}

      - name: Prepare release archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_SUFFIX: ${{ matrix.archive_suffix }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          DIST_DIR="dist"
          STAGE_DIR="$DIST_DIR/package"
          ARCHIVE_NAME="${APP_NAME}-${VERSION}-${ARCHIVE_SUFFIX}.tar.gz"
          BIN_PATH="target/${TARGET}/release/${BIN_NAME}"

          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"
          cp "$BIN_PATH" "$STAGE_DIR/${APP_NAME}"
          cp README.md LICENSE "$STAGE_DIR/"

          tar -C "$STAGE_DIR" -czf "$DIST_DIR/$ARCHIVE_NAME" .
          shasum -a 256 "$DIST_DIR/$ARCHIVE_NAME" | awk '{print $1}' > "$DIST_DIR/$ARCHIVE_NAME.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive_suffix }}
          path: |
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz.sha256

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz
            dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}.tar.gz.sha256

  update-homebrew-formula:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update formula for tagged release
        env:
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ARM_SHA=$(tr -d '\n' < "dist/${APP_NAME}-${VERSION}-macos-aarch64.tar.gz.sha256")
          bash .github/scripts/update-homebrew-formula.sh "$VERSION" "$ARM_SHA" "$INTEL_SHA" "$REPOSITORY"

      - name: Commit formula update
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- Formula/serial-monitor.rb; then
            exit 0
          fi

          git add Formula/serial-monitor.rb
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update Homebrew formula for ${VERSION}"
          git push origin HEAD:main
